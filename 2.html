<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDex Ultra - API & Tailwind & TTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        .font-pokedex { font-family: 'Orbitron', sans-serif; }
        .bg-pattern { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-200 bg-pattern min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[12px] border-red-600 relative">
        
        <div class="absolute top-4 left-6 flex gap-2">
            <div class="w-12 h-12 bg-blue-400 border-4 border-white rounded-full shadow-inner animate-pulse"></div>
            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
            <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
        </div>

        <div class="p-8 mt-10">
            <div class="relative mb-8">
                <input type="text" id="pokemonInput" placeholder="輸入名稱或編號..." 
                       class="w-full pl-6 pr-16 py-4 bg-slate-800 text-green-400 font-mono rounded-xl border-b-4 border-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-slate-500 text-lg">
                <button onclick="fetchPokemon()" class="absolute right-2 top-2 bottom-2 bg-red-500 hover:bg-red-600 text-white px-4 rounded-lg font-bold transition-all active:scale-95">
                    GO!
                </button>
            </div>

            <div id="result" class="hidden space-y-6">
                <div class="bg-slate-800 rounded-lg p-4 border-8 border-slate-300 shadow-inner relative">
                    <img id="pokeImg" src="" alt="pokemon" class="w-48 h-48 mx-auto object-contain transition-all hover:scale-110">
                    <div class="absolute bottom-2 right-2 text-red-500 text-xs font-bold animate-pulse">LIVE DATA</div>
                </div>

                <div class="text-center">
                    <span id="pokeId" class="text-xl font-pokedex text-slate-400">#000</span>
                    <h2 id="pokeName" class="text-4xl font-black text-slate-800 uppercase tracking-tighter mb-2">---</h2>
                    
                    <button onclick="speakPokemon()" class="group flex items-center gap-2 mx-auto bg-yellow-400 hover:bg-yellow-500 text-yellow-900 px-6 py-2 rounded-full font-bold shadow-md transition-all active:translate-y-1">
                        <span class="text-xl group-hover:animate-bounce">🔊</span>
                        <span>語音介紹</span>
                    </button>
                </div>

                <div id="pokeTypes" class="flex justify-center gap-3"></div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-100 p-4 rounded-2xl border-b-4 border-slate-300">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Height</p>
                        <p class="text-2xl font-pokedex text-slate-700"><span id="pokeHeight">0</span> m</p>
                    </div>
                    <div class="bg-slate-100 p-4 rounded-2xl border-b-4 border-slate-300">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Weight</p>
                        <p class="text-2xl font-pokedex text-slate-700"><span id="pokeWeight">0</span> kg</p>
                    </div>
                </div>
            </div>

            <div id="placeholder" class="py-20 text-center text-slate-400 italic">
                請輸入寶可夢名稱開始搜尋...
            </div>
            <p id="errorMsg" class="hidden text-red-500 text-center font-bold mt-4">找不到這隻寶可夢，請確認拼字是否正確！</p>
        </div>

        <div class="bg-red-700 p-4 flex justify-between items-center">
            <div class="w-10 h-10 bg-slate-800 rounded-full border-2 border-slate-600"></div>
            <div class="flex gap-4">
                <div class="w-12 h-2 bg-slate-800 rounded-full"></div>
                <div class="w-12 h-2 bg-slate-800 rounded-full"></div>
            </div>
        </div>
    </div>

    <script>
        // 屬性顏色對照表
        const typeColors = {
            fire: 'bg-orange-500', water: 'bg-blue-500', grass: 'bg-green-500',
            electric: 'bg-yellow-400', ice: 'bg-cyan-300', fighting: 'bg-red-700',
            poison: 'bg-purple-500', ground: 'bg-yellow-700', flying: 'bg-indigo-400',
            psychic: 'bg-pink-500', bug: 'bg-lime-500', rock: 'bg-yellow-800',
            ghost: 'bg-indigo-800', dragon: 'bg-indigo-600', dark: 'bg-slate-800',
            steel: 'bg-gray-500', fairy: 'bg-pink-300', normal: 'bg-slate-400'
        };

        async function fetchPokemon() {
            const input = document.getElementById('pokemonInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('result');
            const placeholder = document.getElementById('placeholder');
            const errorMsg = document.getElementById('errorMsg');

            if (!input) return;

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${input}`);
                if (!response.ok) throw new Error();
                const data = await response.json();

                // 更新文字資訊
                document.getElementById('pokeName').innerText = data.name;
                document.getElementById('pokeId').innerText = `#${data.id.toString().padStart(3, '0')}`;
                document.getElementById('pokeImg').src = data.sprites.other['official-artwork'].front_default;
                document.getElementById('pokeHeight').innerText = data.height / 10;
                document.getElementById('pokeWeight').innerText = data.weight / 10;

                // 更新屬性標籤
                const typesDiv = document.getElementById('pokeTypes');
                typesDiv.innerHTML = '';
                data.types.forEach(t => {
                    const span = document.createElement('span');
                    const colorClass = typeColors[t.type.name] || 'bg-slate-400';
                    span.className = `${colorClass} px-4 py-1 rounded-full text-white text-xs font-bold uppercase shadow-sm border-b-2 border-black/20`;
                    span.innerText = t.type.name;
                    typesDiv.appendChild(span);
                });

                // 控制顯示狀態
                resultDiv.classList.remove('hidden');
                placeholder.classList.add('hidden');
                errorMsg.classList.add('hidden');
            } catch (e) {
                resultDiv.classList.add('hidden');
                placeholder.classList.add('hidden');
                errorMsg.classList.remove('hidden');
            }
        }

        function speakPokemon() {
            const name = document.getElementById('pokeName').innerText;
            const height = document.getElementById('pokeHeight').innerText;
            const weight = document.getElementById('pokeWeight').innerText;
            const types = Array.from(document.querySelectorAll('#pokeTypes span')).map(s => s.innerText).join(' and ');

            // 設定朗讀內容
            const text = `Target identified: ${name}. It is a ${types} type pokémon. Height: ${height} meters. Weight: ${weight} kilograms.`;
            
            // 使用 Web Speech API
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // 英文發音較精準
            utterance.rate = 0.9;     // 稍微放慢一點點更有質感
            utterance.pitch = 1.1;    // 稍微提高音調模擬電子音
            
            // 停止當前正在說的話並重新開始
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // 支援 Enter 鍵搜尋
        document.getElementById('pokemonInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchPokemon();
        });
    </script>
</body>
</html>
